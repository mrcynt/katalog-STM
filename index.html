<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Smart Technology Mandiri</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome untuk Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase SDK Modular -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    window.FirebaseContext = {
      initializeApp, getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously,
      getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc
    };
  </script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    
    /* Animasi Looping Logo */
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .animate-marquee {
      display: flex;
      width: max-content;
      animation: marquee 30s linear infinite;
    }
    .animate-marquee:hover {
      animation-play-state: paused;
    }
  </style>
</head>
<body class="bg-[#F7F5FA] selection:bg-purple-500 selection:text-white">
  <div id="root"></div>

  <script type="text/babel">
    const initApp = () => {
      if (!window.FirebaseContext) {
        setTimeout(initApp, 100);
        return;
      }

      const { useState, useEffect, useRef } = React;
      const { 
        initializeApp, getAuth, onAuthStateChanged, signInWithCustomToken, signInAnonymously, 
        getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc
      } = window.FirebaseContext;

      // ==========================================
      // KONFIGURASI DATABASE FIREBASE (Katalog STM)
      // ==========================================
      let firebaseConfig = {
        apiKey: "AIzaSyCGbJigJENF9b2RkhCy3xxaN3yBHKaxeAs",
        authDomain: "katalogstm.firebaseapp.com",
        projectId: "katalogstm",
        storageBucket: "katalogstm.firebasestorage.app",
        messagingSenderId: "887691629784",
        appId: "1:887691629784:web:a83ffb8f915a2d6bce33ad",
        measurementId: "G-PLEDDH8618"
      };

      let appId = 'katalogstm'; // ID Project kamu
      
      let app, auth, db;
      const isConfigValid = firebaseConfig.projectId && firebaseConfig.projectId !== "ISI_PROJECT_ID_DISINI";
      
      if (isConfigValid) {
        if (typeof __firebase_config !== 'undefined') {
          firebaseConfig = JSON.parse(__firebase_config);
          appId = typeof __app_id !== 'undefined' ? __app_id : appId;
        }
        app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
      }

      // Fungsi Pengompres Gambar 
      const compressImage = (file, maxWidth = 800, quality = 0.6) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const scaleSize = maxWidth / img.width;
              canvas.width = maxWidth;
              canvas.height = img.height * scaleSize;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              
              // Jika file asli adalah PNG, tetap simpan sebagai PNG agar transparan
              const mimeType = file.type === 'image/png' ? 'image/png' : 'image/webp';
              resolve(canvas.toDataURL(mimeType, quality));
            }
          };
        });
      };

      const BRANDS_INITIAL = ['ASUS', 'ACER', 'LENOVO', 'HP', 'APPLE', 'MSI', 'LOGITECH', 'RAZER'];
      const INITIAL_PRODUCTS = [
        { id: 1, name: 'ASUS ROG Zephyrus G14 (2024) - Ryzen 9, RTX 4060', price: 25999000, originalPrice: 28999000, category: 'Laptop', brand: 'ASUS', image: 'https://placehold.co/400x300/ffffff/1A0B2E?text=ASUS+ROG', rating: 4.9, badge: 'Save 10%', stock: 5 },
        { id: 2, name: 'Lenovo Legion Pro 5i - Intel i7 Gen 13, RTX 4070', price: 28500000, originalPrice: 30000000, category: 'Laptop', brand: 'LENOVO', image: 'https://placehold.co/400x300/ffffff/1A0B2E?text=Lenovo+Legion', rating: 4.8, badge: 'Best Seller', stock: 3 }
      ];

      // 5 DEFAULT SLOT UNTUK LOGO PARTNER
      const DEFAULT_PARTNERS = [
        { id: 'p1', name: 'Your Brand', logo: '' },
        { id: 'p2', name: 'Your Brand', logo: '' },
        { id: 'p3', name: 'Your Brand', logo: '' },
        { id: 'p4', name: 'Your Brand', logo: '' },
        { id: 'p5', name: 'Your Brand', logo: '' }
      ];

      const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

      function App() {
        const [activeCategory, setActiveCategory] = useState('Semua');
        const [scrolled, setScrolled] = useState(false);
        const [dbUser, setDbUser] = useState(null);
        
        const [view, setView] = useState('catalog');
        const [isAuthenticated, setIsAuthenticated] = useState(false);
        const [loginData, setLoginData] = useState({ username: '', password: '' });
        const [loginError, setLoginError] = useState('');

        const [products, setProducts] = useState(INITIAL_PRODUCTS);
        const [categories, setCategories] = useState(['Semua', 'Laptop', 'Monitor', 'Aksesoris', 'Komponen PC']);
        const [brandsList, setBrandsList] = useState(BRANDS_INITIAL);
        
        // --- STATE UNTUK CUSTOM MODAL & TOAST ---
        const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
        const [confirmModal, setConfirmModal] = useState({ show: false, message: '', onConfirm: null });

        const showToast = (message, type = 'success') => {
          setToast({ show: true, message, type });
          setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3000);
        };

        const confirmAction = (message, action) => {
          setConfirmModal({ show: true, message, onConfirm: action });
        };

        const handleConfirmYes = () => {
          if (confirmModal.onConfirm) confirmModal.onConfirm();
          setConfirmModal({ show: false, message: '', onConfirm: null });
        };

        const handleConfirmNo = () => {
          setConfirmModal({ show: false, message: '', onConfirm: null });
        };

        // --- STATE UNTUK BANNER SLIDER ---
        const [banners, setBanners] = useState([{
          id: 1,
          badge: 'Katalog Eksklusif 2026',
          title: 'SUPER GAMING WEEK',
          subtitle: 'Tingkatkan pengalaman digital Anda dengan teknologi masa depan yang tersedia hari ini.',
          buttonText: 'Eksplorasi Sekarang',
          backgroundImage: ''
        }]);
        const [currentBannerIndex, setCurrentBannerIndex] = useState(0);
        const [bannerForm, setBannerForm] = useState({
          badge: '', title: '', subtitle: '', buttonText: '', backgroundImage: '', imageFile: null, imagePreview: null
        });
        const [editingBannerId, setEditingBannerId] = useState(null);

        // --- STATE UNTUK PARTNER LOGOS (Card System) ---
        const [partnerLogos, setPartnerLogos] = useState(DEFAULT_PARTNERS);
        
        const [newProduct, setNewProduct] = useState({
          name: '', price: '', originalPrice: '', category: 'Laptop', brand: 'ASUS', badge: '', image: '', imageFile: null, imagePreview: null, stock: ''
        });
        const [isEditing, setIsEditing] = useState(false);
        const [editId, setEditId] = useState(null);
        const [newCustomCategory, setNewCustomCategory] = useState('');
        const [newCustomBrand, setNewCustomBrand] = useState('');
        const [isUploading, setIsUploading] = useState(false);

        const [adminTab, setAdminTab] = useState('dashboard');
        const [adminSearchQuery, setAdminSearchQuery] = useState('');
        const [adminCategoryFilter, setAdminCategoryFilter] = useState('Semua');

        // --- STATE PENCARIAN USER ---
        const [searchQuery, setSearchQuery] = useState('');

        // --- STATE UNTUK AI CHAT BUBBLE ---
        const [isChatOpen, setIsChatOpen] = useState(false);
        const [chatMessages, setChatMessages] = useState([
          { role: 'model', text: 'Halo! Saya AI Sales pintar dari Smart Technology Mandiri 🤖\n\nAda yang bisa saya bantu untuk mencarikan laptop, monitor, atau aksesoris idaman Anda hari ini?' }
        ]);
        const [chatInput, setChatInput] = useState('');
        const [isTyping, setIsTyping] = useState(false);
        const chatEndRef = useRef(null);

        // Auto-scroll chat ke bawah saat ada pesan baru
        useEffect(() => {
          if (isChatOpen) {
            chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
          }
        }, [chatMessages, isTyping, isChatOpen]);

        useEffect(() => {
          if (!auth) return;
          const initAuth = async () => {
            try { 
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
              } else {
                await signInAnonymously(auth); 
              }
            } catch(e) { console.error("Auth error", e) }
          };
          initAuth();
          const unsubscribe = onAuthStateChanged(auth, setDbUser);
          return () => unsubscribe();
        }, []);

        useEffect(() => {
          if (!dbUser || !db) return;

          const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
          const unsubProducts = onSnapshot(productsRef, (snap) => {
            if (!snap.empty) {
              const prods = snap.docs.map(doc => ({id: Number(doc.id), ...doc.data()}));
              setProducts(prods.sort((a,b) => b.id - a.id));
            } else {
              // Populate initial data if empty
              INITIAL_PRODUCTS.forEach(p => setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', String(p.id)), p));
            }
          }, (err) => console.error("Snapshot error (Products):", err));

          const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
          const unsubSettings = onSnapshot(settingsRef, (snap) => {
            snap.docs.forEach(docSnap => {
              if (docSnap.id === 'catalogSettings') {
                const data = docSnap.data();
                if(data.banners && data.banners.length > 0) setBanners(data.banners);
                else if(data.bannerInfo) setBanners([{ id: 1, ...data.bannerInfo }]);
                
                if(data.categories) setCategories(data.categories);
                if(data.brandsList) setBrandsList(data.brandsList);
                
                if(data.partnerLogos && data.partnerLogos.length > 0) {
                  let loadedLogos = [...data.partnerLogos];
                  while (loadedLogos.length < 5) {
                    loadedLogos.push({ id: `p_${Date.now()}_${loadedLogos.length}`, name: `Your Brand`, logo: '' });
                  }
                  setPartnerLogos(loadedLogos);
                } else {
                  setPartnerLogos(DEFAULT_PARTNERS);
                }
              }
            });
          }, (err) => console.error("Snapshot error (Settings):", err));

          return () => { unsubProducts(); unsubSettings(); };
        }, [dbUser]);

        useEffect(() => {
          if (view !== 'catalog' || banners.length <= 1) return;
          const timer = setInterval(() => {
            setCurrentBannerIndex((prev) => (prev + 1) % banners.length);
          }, 5000);
          return () => clearInterval(timer);
        }, [banners.length, view]);

        useEffect(() => {
          const handleScroll = () => setScrolled(window.scrollY > 20);
          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        const filteredProducts = products.filter(product => {
          const matchCategory = activeCategory === 'Semua' || product.category === activeCategory;
          const matchSearch = product.name.toLowerCase().includes(searchQuery.toLowerCase()) || product.brand.toLowerCase().includes(searchQuery.toLowerCase());
          return matchCategory && matchSearch;
        });

        const filteredAdminProducts = products.filter(product => {
          const matchesSearch = product.name.toLowerCase().includes(adminSearchQuery.toLowerCase());
          const matchesCategory = adminCategoryFilter === 'Semua' || product.category === adminCategoryFilter;
          return matchesSearch && matchesCategory;
        });

        const scrollToKatalog = () => document.getElementById('katalog-produk')?.scrollIntoView({ behavior: 'smooth' });

        const handleLogin = (e) => {
          e.preventDefault();
          if (loginData.username === 'STM' && loginData.password === 'STM123') {
            setIsAuthenticated(true); setView('admin'); setLoginError(''); setLoginData({ username: '', password: '' });
          } else {
            setLoginError('Username atau Password tidak valid!');
          }
        };

        const handleExportCSV = () => {
          const headers = ['ID Produk', 'Nama Produk', 'Kategori', 'Merek', 'Harga (Rp)', 'Stok'];
          const dataToExport = adminCategoryFilter === 'Semua' ? products : products.filter(p => p.category === adminCategoryFilter);
          const rows = dataToExport.map(p => [p.id, `"${p.name.replace(/"/g, '""')}"`, `"${p.category}"`, `"${p.brand}"`, p.price, p.stock]);
          const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows.map(e => e.join(','))].join("\n");
          const encodedUri = encodeURI(csvContent);
          const link = document.createElement("a");
          link.setAttribute("href", encodedUri);
          link.setAttribute("download", `Laporan_Stok_${adminCategoryFilter}_${new Date().toISOString().split('T')[0]}.csv`);
          document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        const handleSaveProduct = async () => {
          if (!newProduct.name || !newProduct.price) return;
          setIsUploading(true);
          
          let finalCategory = newProduct.category === 'NEW_CATEGORY' && newCustomCategory ? newCustomCategory : newProduct.category;
          let finalBrand = newProduct.brand === 'NEW_BRAND' && newCustomBrand ? newCustomBrand.toUpperCase() : newProduct.brand;
          let newCats = [...categories]; if (!newCats.includes(finalCategory)) newCats.push(finalCategory);
          let newBrands = [...brandsList]; if (!newBrands.includes(finalBrand)) newBrands.push(finalBrand);

          let imageUrl = newProduct.image || 'https://placehold.co/400x300/ffffff/1A0B2E?text=No+Image';

          try {
            if (newProduct.imageFile) {
              imageUrl = await compressImage(newProduct.imageFile);
            }

            const productData = {
              name: newProduct.name, badge: newProduct.badge, category: finalCategory, brand: finalBrand,
              price: Number(newProduct.price), originalPrice: newProduct.originalPrice ? Number(newProduct.originalPrice) : Number(newProduct.price),
              stock: Number(newProduct.stock) || 0, image: imageUrl, rating: newProduct.rating || 5.0
            };

            const saveId = isEditing ? editId : Date.now();
            productData.id = saveId;

            if (db) {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', String(saveId)), productData);
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { categories: newCats, brandsList: newBrands }, { merge: true });
            } else {
              if (isEditing) setProducts(products.map(p => p.id === saveId ? productData : p));
              else setProducts([productData, ...products]);
              setCategories(newCats); setBrandsList(newBrands);
            }
            
            showToast(isEditing ? "Perubahan produk berhasil disimpan!" : "Produk baru berhasil ditambahkan!");
            setIsEditing(false); setEditId(null);
            setNewProduct({ name: '', price: '', originalPrice: '', category: 'Laptop', brand: 'ASUS', badge: '', image: '', imageFile: null, imagePreview: null, stock: '' });
            setNewCustomCategory(''); setNewCustomBrand('');
          } catch (error) {
            console.error(error); showToast("Terjadi kesalahan sistem saat memproses gambar.", "error");
          } finally {
            setIsUploading(false);
          }
        };

        const handleDeleteProduct = (id) => {
          confirmAction("Yakin ingin menghapus produk ini secara permanen?", async () => {
            if (db) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', String(id)));
            else setProducts(products.filter(p => p.id !== id));
            showToast("Produk berhasil dihapus.");
          });
        };

        const handleSaveBannerForm = async () => {
          setIsUploading(true);
          try {
            let bgUrl = bannerForm.backgroundImage;
            if (bannerForm.imageFile) {
              bgUrl = await compressImage(bannerForm.imageFile);
            }

            const newBannerData = { 
              id: editingBannerId || Date.now(),
              badge: bannerForm.badge, 
              title: bannerForm.title, 
              subtitle: bannerForm.subtitle, 
              buttonText: bannerForm.buttonText, 
              backgroundImage: bgUrl 
            };

            let updatedBanners;
            if (editingBannerId) {
              updatedBanners = banners.map(b => b.id === editingBannerId ? newBannerData : b);
            } else {
              updatedBanners = [...banners, newBannerData];
            }

            if (db) {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { banners: updatedBanners }, { merge: true });
            } else {
              setBanners(updatedBanners);
            }
            
            showToast(editingBannerId ? "Banner berhasil diperbarui!" : "Banner baru berhasil ditambahkan!");
            setBannerForm({ badge: '', title: '', subtitle: '', buttonText: '', backgroundImage: '', imageFile: null, imagePreview: null });
            setEditingBannerId(null);
          } catch (error) {
            console.error(error); showToast("Gagal menyimpan data banner.", "error");
          } finally {
            setIsUploading(false);
          }
        };

        const handleEditBannerClick = (banner) => {
          setBannerForm({
            badge: banner.badge || '', title: banner.title || '', subtitle: banner.subtitle || '', buttonText: banner.buttonText || '',
            backgroundImage: banner.backgroundImage || '', imageFile: null, imagePreview: banner.backgroundImage || null
          });
          setEditingBannerId(banner.id);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleDeleteBannerClick = (id) => {
          if(banners.length <= 1) {
            showToast("Gagal: Harus tersisa minimal 1 banner yang tayang!", "error");
            return;
          }
          confirmAction("Yakin ingin menghapus banner ini dari halaman depan?", async () => {
            const updatedBanners = banners.filter(b => b.id !== id);
            if (db) {
              await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { banners: updatedBanners }, { merge: true });
            } else {
              setBanners(updatedBanners);
            }
            if(currentBannerIndex >= updatedBanners.length) setCurrentBannerIndex(0);
            showToast("Banner berhasil dihapus.");
          });
        };

        const handleRemoveBannerImage = () => {
          setBannerForm({ ...bannerForm, backgroundImage: '', imageFile: null, imagePreview: null });
        };

        const handleSavePartnersDB = async () => {
          if (db) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { partnerLogos }, { merge: true });
          }
        };

        const handleImageSelectPartner = async (id, file) => {
          if (!file) return;
          try {
            const compressedUrl = await compressImage(file, 300, 0.8);
            const updatedLogos = partnerLogos.map(p => p.id === id ? { ...p, logo: compressedUrl } : p);
            setPartnerLogos(updatedLogos);
            if (db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { partnerLogos: updatedLogos }, { merge: true });
            showToast("Foto Partner berhasil diupload!");
          } catch (e) {
            showToast("Gagal memproses gambar logo", "error");
          }
        };

        const handleNameChangePartner = (id, newName) => {
          setPartnerLogos(partnerLogos.map(p => p.id === id ? { ...p, name: newName } : p));
        };

        const handleClearPartnerImage = async (id) => {
          const updated = partnerLogos.map(p => p.id === id ? { ...p, logo: '' } : p);
          setPartnerLogos(updated);
          if (db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { partnerLogos: updated }, { merge: true });
        };

        const handleDeletePartnerSlot = async (id) => {
          if (partnerLogos.length <= 5) {
            return showToast("Sistem mewajibkan minimal ada 5 slot partner!", "error");
          }
          confirmAction("Hapus kotak slot partner ini secara permanen?", async () => {
            const updated = partnerLogos.filter(p => p.id !== id);
            setPartnerLogos(updated);
            if (db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { partnerLogos: updated }, { merge: true });
            showToast("Slot berhasil dihapus.");
          });
        };

        const handleAddPartnerSlot = async () => {
          const newSlot = { id: `p${Date.now()}`, name: `Partner Baru`, logo: '' };
          const updated = [...partnerLogos, newSlot];
          setPartnerLogos(updated);
          if (db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'catalogSettings'), { partnerLogos: updated }, { merge: true });
          showToast("Satu slot baru berhasil ditambahkan!");
        };

        const handleEditProduct = (product) => {
          setNewProduct({ name: product.name, price: product.price, originalPrice: product.originalPrice, category: product.category, brand: product.brand, badge: product.badge || '', image: product.image || '', imageFile: null, imagePreview: product.image || null, stock: product.stock || 0 });
          setIsEditing(true); setEditId(product.id); setAdminTab('products'); window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const handleCancelEdit = () => {
          setIsEditing(false); setEditId(null);
          setNewProduct({ name: '', price: '', originalPrice: '', category: 'Laptop', brand: 'ASUS', badge: '', image: '', imageFile: null, imagePreview: null, stock: '' });
          setNewCustomCategory(''); setNewCustomBrand('');
        };

        // --- FUNGSI WHATSAPP ---
        const handleWhatsAppClick = (product = null) => {
          const phone = "6285381170567"; // Nomor WA kamu dengan kode negara 62
          let text = "Halo Admin Smart Technology Mandiri, saya ingin berkonsultasi mengenai produk di katalog Anda.";
          
          if (product) {
            text = `Halo Admin Smart Technology Mandiri,\n\nSaya tertarik dengan produk ini:\n*${product.name}*\n*Harga:* ${formatRupiah(product.price)}\n\nApakah stoknya masih tersedia?`;
          }
          
          window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
        };

        // --- FUNGSI AI CHAT (GEMINI API) ---
        const handleSendChatMessage = async () => {
          if (!chatInput.trim()) return;
          
          const userText = chatInput.trim();
          const newUserMsg = { role: 'user', text: userText };
          setChatMessages(prev => [...prev, newUserMsg]);
          setChatInput('');
          setIsTyping(true);

          // PENTING: Untuk di Canvas biarkan kosong "". Jika upload ke Vercel, isi dengan API Key dari Google AI Studio.
          const apiKey = ""; 
          const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

          // Format katalog secara otomatis (Hanya yang stok > 0)
          const catalogContext = products
            .filter(p => p.stock > 0)
            .map(p => `- ${p.name} | Kategori: ${p.category} | Brand: ${p.brand} | Harga: ${formatRupiah(p.price)} | Stok: ${p.stock}`)
            .join('\n');

          const systemPrompt = `Anda adalah "STM AI Sales", asisten virtual pintar dan ramah untuk toko "Smart Technology Mandiri".
Tugas utama Anda adalah merekomendasikan produk kepada pelanggan HANYA berdasarkan data katalog toko kami di bawah ini.

Katalog Produk Tersedia Saat Ini:
${catalogContext}

                      delay *= 2;
                  }

                          </div>
                          <div className="flex items-center gap-2 flex-shrink-0">
                            <button onClick={() => handleEditProduct(p)} className="text-cyan-600 hover:text-cyan-700 bg-cyan-50 hover:bg-cyan-100 w-10 h-10 rounded-full flex items-center justify-center transition-colors"><i className="fas fa-edit"></i></button>
                            <button onClick={() => handleDeleteProduct(p.id)} className="text-red-500 hover:text-red-600 bg-red-50 hover:bg-red-100 w-10 h-10 rounded-full flex items-center justify-center transition-colors"><i className="fas fa-trash"></i></button>
                          </div>
                        </div>
                      )) : <div className="text-center py-12 bg-white/50 rounded-xl border border-white shadow-sm"><i className="fas fa-search text-3xl text-slate-300 mb-3"></i><p className="text-slate-500 text-sm">Produk tidak ditemukan.</p></div>}
                    </div>
                  </div>
                )}

                {/* 3. TAB BANNER & LOGO */}
                {adminTab === 'banner' && (
                  <div className="space-y-8 animate-fade-in">
                    {/* MANAJEMEN BANNER SLIDER */}
                    <div className="bg-white/60 backdrop-blur-xl p-6 sm:p-8 rounded-3xl border border-white shadow-[0_8px_30px_rgba(0,35,69,0.05)]">
                      <h2 className="text-lg font-bold text-[#002345] mb-6 flex items-center gap-2"><i className="fas fa-images text-cyan-500"></i> Kelola Banner Slider</h2>
                      <div className={`bg-white/50 backdrop-blur-md p-4 sm:p-6 rounded-2xl border ${editingBannerId ? 'border-cyan-400' : 'border-white/80'} shadow-sm mb-8 transition-all`}>
                        <h3 className={`text-sm font-bold uppercase tracking-widest mb-6 flex items-center gap-2 ${editingBannerId ? 'text-cyan-600' : 'text-[#002345]'}`}>
                          <i className={`fas ${editingBannerId ? 'fa-edit' : 'fa-plus-circle'}`}></i> {editingBannerId ? 'Edit Banner' : 'Tambah Banner Baru'}
                        </h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                          <div><label className="block text-xs uppercase tracking-widest mb-2 text-slate-500 font-bold">Label Atas (Opsional)</label><input type="text" value={bannerForm.badge} onChange={e => setBannerForm({...bannerForm, badge: e.target.value})} className="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-3 text-[#002345] focus:outline-none focus:border-cyan-500" /></div>
                          <div><label className="block text-xs uppercase tracking-widest mb-2 text-slate-500 font-bold">Teks Tombol Aksi</label><input type="text" value={bannerForm.buttonText} onChange={e => setBannerForm({...bannerForm, buttonText: e.target.value})} className="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-3 text-[#002345] focus:outline-none focus:border-cyan-500" /></div>
                          <div className="sm:col-span-2"><label className="block text-xs uppercase tracking-widest mb-2 text-slate-500 font-bold">Judul Utama Banner</label><input type="text" value={bannerForm.title} onChange={e => setBannerForm({...bannerForm, title: e.target.value})} className="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-3 text-[#002345] font-bold focus:outline-none focus:border-cyan-500 text-lg" /></div>
                          <div className="sm:col-span-2"><label className="block text-xs uppercase tracking-widest mb-2 text-slate-500 font-bold">Deskripsi / Sub-judul</label><textarea value={bannerForm.subtitle} onChange={e => setBannerForm({...bannerForm, subtitle: e.target.value})} className="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-3 text-[#002345] focus:outline-none focus:border-cyan-500 h-24"></textarea></div>
                          
                          <div className="sm:col-span-2 bg-white/80 p-4 rounded-xl border border-slate-200 flex flex-col sm:flex-row items-center gap-4">
                            <div className="w-full sm:flex-1"><label className="block text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">Upload Gambar Latar</label>
                              <input type="file" accept="image/*" onChange={(e) => { if(e.target.files[0]) { setBannerForm({...bannerForm, imageFile: e.target.files[0], imagePreview: URL.createObjectURL(e.target.files[0])}) } }} className="block w-full text-xs text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-cyan-50 file:text-cyan-600 hover:file:bg-cyan-100 transition-all cursor-pointer" />
                            </div>
                            {bannerForm.imagePreview && (
                              <div className="flex flex-col items-center gap-2 flex-shrink-0">
                                <div className="h-20 w-32 bg-slate-100 rounded-lg overflow-hidden border border-slate-200"><img src={bannerForm.imagePreview} className="w-full h-full object-cover" /></div>
                                <button onClick={handleRemoveBannerImage} className="text-[10px] text-red-500 hover:text-red-600 underline"><i className="fas fa-times"></i> Hapus Gambar</button>
                              </div>
                            )}
                          </div>
                          <div className="sm:col-span-2 mt-4 flex flex-col sm:flex-row gap-4">
                            <button onClick={handleSaveBannerForm} disabled={isUploading} className="flex-1 bg-gradient-to-r from-cyan-500 to-purple-600 text-white font-bold rounded-xl px-8 py-3 hover:scale-[1.02] transition-transform flex justify-center items-center gap-2 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"><i className={`fas ${isUploading ? 'fa-spinner fa-spin' : 'fa-save'}`}></i> {isUploading ? 'Menyimpan...' : editingBannerId ? 'Simpan Perubahan Banner' : 'Tambah Banner Baru'}</button>
                            {editingBannerId && <button onClick={() => {setEditingBannerId(null); setBannerForm({badge:'', title:'', subtitle:'', buttonText:'', backgroundImage:'', imageFile:null, imagePreview:null});}} className="bg-white/80 border border-red-200 text-red-500 font-bold rounded-xl px-8 py-3 hover:bg-red-50 transition-colors shadow-sm">Batal</button>}
                          </div>
                        </div>
                      </div>

                      <div className="space-y-3">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-[#002345] mb-4">Daftar Banner Tayang</h3>
                        {banners.map((b, index) => (
                          <div key={b.id} className="bg-white/70 backdrop-blur-md p-4 rounded-xl flex items-center justify-between gap-4 border border-white shadow-sm hover:shadow-md transition-all">
                            <div className="flex items-center gap-4 flex-1">
                              <div className="w-20 h-12 bg-slate-100 rounded-lg flex-shrink-0 overflow-hidden relative border border-slate-200">
                                {b.backgroundImage ? <img src={b.backgroundImage} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-gradient-to-br from-cyan-200/40 to-purple-300/40"></div>}
                                <div className="absolute top-0 left-0 bg-[#002345]/80 text-white text-[8px] px-1.5 py-0.5 rounded-br-md">#{index + 1}</div>
                              </div>
                              <div className="flex-1"><div className="text-[#002345] text-sm font-semibold line-clamp-1">{b.title || 'Tanpa Judul'}</div><div className="text-[10px] text-slate-500 mt-1">{b.subtitle ? b.subtitle.substring(0, 50) + '...' : 'Tanpa Sub-judul'}</div></div>
                            </div>
                            <div className="flex items-center gap-2 flex-shrink-0">
                              <button onClick={() => handleEditBannerClick(b)} className="text-cyan-600 hover:text-cyan-700 bg-cyan-50 hover:bg-cyan-100 w-10 h-10 rounded-full flex items-center justify-center transition-colors"><i className="fas fa-edit"></i></button>
                              <button onClick={() => handleDeleteBannerClick(b.id)} className="text-red-500 hover:text-red-600 bg-red-50 hover:bg-red-100 w-10 h-10 rounded-full flex items-center justify-center transition-colors"><i className="fas fa-trash"></i></button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* MANAJEMEN SLOT LOGO PARTNER (CARD SYSTEM) */}
                    <div className="bg-white/60 backdrop-blur-xl p-6 sm:p-8 rounded-3xl border border-white shadow-[0_8px_30px_rgba(0,35,69,0.05)]">
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                        <h2 className="text-lg font-bold text-[#002345] flex items-center gap-2"><i className="fas fa-handshake text-cyan-500"></i> Kelola Slot Logo Partner</h2>
                        <button onClick={handleAddPartnerSlot} className="bg-cyan-50 hover:bg-cyan-100 text-cyan-700 border border-cyan-200 px-4 py-2 rounded-xl text-xs font-bold transition-colors flex items-center gap-2 shadow-sm">
                          <i className="fas fa-plus"></i> Tambah Slot
                        </button>
                      </div>
                      
                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                        {partnerLogos.map((p, index) => (
                          <div key={p.id} className="bg-white/70 backdrop-blur-md p-4 rounded-2xl border border-white shadow-sm flex flex-col gap-3 group relative hover:border-cyan-300 hover:shadow-md transition-all">
                            <div className="absolute -top-2 -left-2 w-6 h-6 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full flex items-center justify-center text-[10px] font-bold text-white shadow-lg z-10">{index + 1}</div>
                            
                            {/* Area Gambar dengan Hover Upload */}
                            <div className="h-16 bg-white rounded-xl flex items-center justify-center relative overflow-hidden border border-slate-100 group-hover:border-cyan-300 transition-colors">
                              {p.logo ? (
                                 <img src={p.logo} alt={p.name} className="h-full w-full object-contain p-2" />
                              ) : (
                                 <div className="text-slate-300 text-[10px] font-black uppercase tracking-widest text-center px-2">KOSONG</div>
                              )}
                              {/* Hover Overlay Upload */}
                              <label className="absolute inset-0 bg-white/90 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer backdrop-blur-sm z-20">
                                 <i className="fas fa-upload text-cyan-600 mb-1"></i>
                                 <span className="text-cyan-600 text-[9px] font-bold uppercase">Upload</span>
                                 <input type="file" accept="image/*" className="hidden" onChange={e => handleImageSelectPartner(p.id, e.target.files[0])} />
                              </label>
                            </div>
                            
                            {/* Input Nama Auto-Save */}
                            <input 
                              type="text" 
                              value={p.name} 
                              onChange={e => handleNameChangePartner(p.id, e.target.value)} 
                              onBlur={handleSavePartnersDB} 
                              placeholder="Nama Brand" 
                              className="bg-transparent border-b border-slate-200 text-[#002345] text-[10px] px-1 py-1 focus:border-cyan-500 focus:outline-none text-center w-full uppercase tracking-wider transition-colors" 
                            />
                            
                            <div className="flex justify-between items-center mt-auto pt-2 border-t border-slate-100">
                               <button onClick={() => handleClearPartnerImage(p.id)} title="Hapus Foto Saja" className="text-orange-500 hover:text-orange-600 text-[9px] p-1 transition-colors"><i className="fas fa-eraser mr-1"></i> Foto</button>
                               <button onClick={() => handleDeletePartnerSlot(p.id)} disabled={partnerLogos.length <= 5} title="Hapus Kotak Slot" className="text-red-500 hover:text-red-600 text-[9px] p-1 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"><i className="fas fa-trash mr-1"></i> Slot</button>
                            </div>
                          </div>
                        ))}
                      </div>
                      <p className="text-slate-500 text-[10px] mt-6 italic bg-white/50 backdrop-blur-sm p-3 rounded-lg border border-white shadow-sm"><i className="fas fa-info-circle text-cyan-500 mr-2"></i> Sistem secara otomatis mewajibkan minimal ada 5 slot. Jika Anda tidak mengupload foto, akan muncul placeholder bingkai elegan bertuliskan nama brand di halaman depan pembeli. (Perubahan nama brand otomatis tersimpan saat Anda mengetik).</p>
                    </div>

                  </div>
                )}
              </div>

              {/* TOAST NOTIFICATION - LIGHT GLASS */}
              {toast.show && (
                <div className={`fixed top-4 right-4 z-[100] px-6 py-3 rounded-xl shadow-xl border backdrop-blur-xl flex items-center gap-3 animate-fade-in ${toast.type === 'error' ? 'bg-white/90 border-red-200 text-red-600' : 'bg-white/90 border-green-200 text-green-600'}`}>
                  <i className={`fas ${toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}`}></i>
                  <span className="text-sm font-bold">{toast.message}</span>
                </div>
              )}

              {/* CONFIRM MODAL KUSTOM - LIGHT GLASS */}
              {confirmModal.show && (
                <div className="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="bg-white/90 backdrop-blur-2xl border border-white p-6 rounded-3xl shadow-[0_30px_60px_rgba(0,35,69,0.15)] max-w-sm w-full text-center animate-fade-in">
                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                      <i className="fas fa-exclamation-triangle text-2xl"></i>
                    </div>
                    <h3 className="text-[#002345] font-bold mb-2">Konfirmasi Hapus</h3>
                    <p className="text-slate-500 text-sm mb-6">{confirmModal.message}</p>
                    <div className="flex gap-3">
                      <button onClick={handleConfirmNo} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl py-2.5 text-sm font-bold transition-colors">Batal</button>
                      <button onClick={handleConfirmYes} className="flex-1 bg-red-500 text-white rounded-xl py-2.5 text-sm font-bold shadow-lg shadow-red-500/30 hover:bg-red-600 transition-colors">Ya, Hapus</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // ==========================================
        // TAMPILAN USER (KATALOG)
        // ==========================================
        return (
          <div className="font-sans text-gray-800 relative">
            
            {/* FLOATING BUTTON UNTUK AI CHAT */}
            <button onClick={() => setIsChatOpen(!isChatOpen)} className={`fixed bottom-6 right-6 z-50 bg-gradient-to-r from-cyan-400 to-purple-500 text-white p-4 rounded-full shadow-[0_8px_30px_rgba(168,85,247,0.4)] hover:scale-110 hover:shadow-[0_8px_40px_rgba(34,211,238,0.6)] transition-all duration-300 group flex items-center justify-center w-14 h-14 ${isChatOpen ? 'rotate-180 bg-red-500 from-red-500 to-rose-600' : ''}`}>
              <i className={`fas ${isChatOpen ? 'fa-times' : 'fa-robot'} text-2xl ${!isChatOpen ? 'animate-pulse' : ''}`}></i>
              {!isChatOpen && <span className="absolute right-full mr-4 top-1/2 -translate-y-1/2 bg-[#1A0B2E] text-white text-xs px-3 py-2 rounded-xl whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none shadow-xl border border-cyan-500/30">Tanya AI Sales</span>}
            </button>

            {/* JENDELA AI CHAT BUBBLE */}
            {isChatOpen && (
              <div className="fixed bottom-24 right-6 w-[340px] sm:w-[380px] h-[500px] bg-[#1A0B2E] border border-cyan-500/30 rounded-3xl shadow-[0_10px_50px_rgba(26,11,46,0.9)] z-50 flex flex-col overflow-hidden animate-fade-in flex-shrink-0">
                {/* Header Chat */}
                <div className="bg-[#0D0518] text-white p-4 flex justify-between items-center border-b border-cyan-500/20">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-cyan-500/20 rounded-full flex items-center justify-center border border-cyan-500/50">
                      <i className="fas fa-robot text-cyan-400 text-lg"></i>
                    </div>
                    <div>
                      <h3 className="font-bold text-sm text-cyan-400 uppercase tracking-widest">STM AI Sales</h3>
                      <p className="text-[9px] text-green-400 flex items-center gap-1"><span className="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span> Online 24/7</p>
                    </div>
                  </div>
                  <button onClick={() => setIsChatOpen(false)} className="text-slate-400 hover:text-red-400 transition-colors"><i className="fas fa-times"></i></button>
                </div>

                {/* Area Pesan */}
                <div className="flex-1 p-4 overflow-y-auto space-y-4 bg-gradient-to-b from-[#1A0B2E] to-[#0D0518]">
                  {chatMessages.map((msg, idx) => (
                    <div key={idx} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                      <div className={`p-3 max-w-[85%] rounded-2xl text-xs sm:text-sm shadow-md whitespace-pre-wrap ${msg.role === 'user' ? 'bg-gradient-to-r from-purple-600 to-cyan-600 text-white rounded-tr-sm' : 'bg-white/10 text-slate-200 border border-white/5 rounded-tl-sm'}`}>
                        {msg.text}
                      </div>
                      <span className="text-[8px] text-slate-500 mt-1">{msg.role === 'user' ? 'Anda' : 'AI Assistant'}</span>
                    </div>
                  ))}
                  {isTyping && (
                    <div className="flex items-start">
                      <div className="bg-white/10 p-3 rounded-2xl rounded-tl-sm border border-white/5 flex gap-1">
                        <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce"></span>
                        <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style={{animationDelay: '0.2s'}}></span>
                        <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style={{animationDelay: '0.4s'}}></span>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef}></div>
                </div>

                {/* Tombol Darurat ke Admin Asli */}
                <div className="bg-[#0D0518] px-4 py-2 border-t border-white/5 flex justify-center">
                  <button onClick={() => handleWhatsAppClick()} className="text-[10px] text-cyan-400 hover:text-cyan-300 font-bold uppercase tracking-widest flex items-center gap-2">
                    <i className="fab fa-whatsapp text-green-400 text-sm"></i> Chat dengan Admin Manusia
                  </button>
                </div>

                {/* Area Input Chat */}
                <div className="p-3 bg-[#0D0518] border-t border-purple-500/20 flex gap-2">
                  <input 
                    type="text" 
                    placeholder="Tanya rekomendasi produk..." 
                    value={chatInput}
                    onChange={(e) => setChatInput(e.target.value)}
                    onKeyPress={(e) => e.key === 'Enter' && handleSendChatMessage()}
                    className="bg-[#1A0B2E] border border-purple-500/30 rounded-xl px-4 py-2.5 text-white text-xs focus:outline-none focus:border-cyan-400 w-full"
                  />
                  <button 
                    onClick={handleSendChatMessage}
                    disabled={!chatInput.trim() || isTyping}
                    className="bg-cyan-500 hover:bg-cyan-400 text-[#0D0518] w-10 h-10 rounded-xl flex items-center justify-center transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    <i className="fas fa-paper-plane"></i>
                  </button>
                </div>
              </div>
            )}

            <header className={`sticky top-0 z-40 transition-all duration-300 ${scrolled ? 'bg-[#1A0B2E]/90 backdrop-blur-lg shadow-lg py-2' : 'bg-[#1A0B2E] py-4'} border-b border-white/5`}>
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div className="flex items-center justify-between gap-3 sm:gap-6">
                  
                  <div className="flex items-center gap-3 sm:gap-4 cursor-pointer group flex-shrink-0">
                    <img src="https://drive.google.com/thumbnail?id=1WLxFwy421QxxzZ4vfwfozlWSUT1qMZgr&sz=w800" alt="SMART TECHNOLOGY MANDIRI" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/400x100/1A0B2E/a855f7?text=SMART+TECH'; }} className="h-8 sm:h-12 object-contain group-hover:scale-105 transition-transform duration-300 drop-shadow-[0_0_12px_rgba(168,85,247,0.4)]" />
                    <div className="hidden sm:block border-l-2 border-purple-500/30 pl-4 py-1">
                      <h1 className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 font-bold tracking-widest text-sm uppercase flex items-center gap-2"><i className="fas fa-bolt text-yellow-400 text-xs"></i> KATALOG RESMI</h1>
                      <p className="text-slate-300 text-[10px] tracking-widest uppercase mt-0.5">SMART TECHNOLOGY MANDIRI</p>
                    </div>
                  </div>

                  <div className="flex items-center gap-3 sm:gap-6 flex-1 justify-end">
                    {/* BAR PENCARIAN USER */}
                    <div className="relative group flex-1 max-w-[200px] sm:max-w-xs">
                      <div className="flex items-center bg-white/5 rounded-full border border-white/10 px-3 py-1.5 sm:px-4 sm:py-2 w-full focus-within:bg-[#0D0518] focus-within:border-cyan-400 transition-all duration-300">
                        <i className="fas fa-search text-slate-400 text-[10px] sm:text-xs mr-2 sm:mr-3 group-focus-within:text-cyan-400"></i>
                        <input 
                          type="text" 
                          placeholder="Cari produk..." 
                          value={searchQuery}
                          onChange={(e) => {
                            setSearchQuery(e.target.value);
                            if(e.target.value !== '' && window.scrollY < 300) {
                              document.getElementById('katalog-produk')?.scrollIntoView({ behavior: 'smooth' });
                            }
                          }}
                          className="bg-transparent border-none outline-none text-[10px] sm:text-xs text-white w-full placeholder-slate-400/70"
                        />
                        {searchQuery && (
                          <button onClick={() => setSearchQuery('')} className="text-slate-400 hover:text-red-400 ml-1 sm:ml-2 transition-colors flex-shrink-0">
                            <i className="fas fa-times text-[10px] sm:text-xs"></i>
                          </button>
                        )}
                      </div>
                    </div>

                    <button onClick={() => { isAuthenticated ? setView('admin') : setView('login') }} className="flex flex-col items-center hover:text-cyan-400 transition-colors group flex-shrink-0">
                      <div className="p-1.5 sm:p-2 bg-white/5 rounded-full group-hover:bg-purple-500/20 transition-colors w-8 h-8 sm:w-9 sm:h-9 flex items-center justify-center relative">{db && <span className="absolute -top-1 -right-1 w-2.5 h-2.5 sm:w-3 sm:h-3 bg-green-400 border-2 border-[#1A0B2E] rounded-full"></span>}<i className="fas fa-user-shield text-white group-hover:text-cyan-400 text-sm sm:text-base"></i></div>
                      <span className="text-[9px] sm:text-[10px] tracking-wider uppercase hidden sm:block mt-1 text-slate-300 group-hover:text-cyan-400">Admin</span>
                    </button>
                  </div>

                </div>
              </div>
            </header>

            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-12">
              
              {/* CURRENT BANNER RENDER (AUTO SLIDE) */}
              {(() => {
                const currentBanner = banners[currentBannerIndex] || banners[0] || {};
                return (
                  <section className="relative rounded-3xl overflow-hidden shadow-[0_20px_50px_-12px_rgba(26,11,46,0.5)] h-64 sm:h-[450px] w-full flex items-center justify-center bg-gradient-to-br from-[#0D0518] via-[#1A0B2E] to-[#2D1650] text-white group" style={currentBanner.backgroundImage ? { backgroundImage: `url(${currentBanner.backgroundImage})`, backgroundSize: 'cover', backgroundPosition: 'center' } : {}}>
                    {currentBanner.backgroundImage && <div className="absolute inset-0 bg-[#0D0518]/70 mix-blend-multiply z-0"></div>}
                    {!currentBanner.backgroundImage && (
                      <React.Fragment>
                        <div className="absolute top-0 left-1/4 w-64 h-64 bg-cyan-500/20 rounded-full blur-[80px] mix-blend-screen group-hover:scale-150 transition-transform duration-1000 z-0"></div>
                        <div className="absolute bottom-0 right-1/4 w-80 h-80 bg-purple-600/30 rounded-full blur-[80px] mix-blend-screen group-hover:scale-150 transition-transform duration-1000 delay-100 z-0"></div>
                      </React.Fragment>
                    )}
                    
                    <div key={currentBanner.id} className="relative z-10 text-center px-6 flex flex-col items-center animate-fade-in w-full">
                      {currentBanner.badge && <button onClick={scrollToKatalog} className="inline-block border border-purple-500/50 text-cyan-400 hover:bg-purple-500/20 hover:text-white hover:scale-105 transition-all duration-300 text-xs px-4 py-1.5 mb-6 rounded-full tracking-widest uppercase bg-white/5 backdrop-blur-md shadow-lg">{currentBanner.badge}</button>}
                      <h1 className="text-4xl sm:text-7xl font-black mb-4 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-white to-purple-300 drop-shadow-sm">{currentBanner.title}</h1>
                      <p className="text-sm sm:text-xl text-purple-200/80 font-light mb-8 tracking-wide max-w-xl whitespace-pre-wrap">{currentBanner.subtitle}</p>
                      {currentBanner.buttonText && <button onClick={scrollToKatalog} className="bg-gradient-to-r from-cyan-400 to-purple-500 text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:shadow-[0_0_30px_rgba(34,211,238,0.6)] hover:scale-105 flex items-center gap-2 uppercase tracking-widest text-sm">{currentBanner.buttonText} <i className="fas fa-arrow-right ml-1"></i></button>}
                    </div>

                    {/* Dots Indicator */}
                    {banners.length > 1 && (
                      <div className="absolute bottom-6 left-0 right-0 flex justify-center gap-2 z-20">
                        {banners.map((_, idx) => (
                          <button key={idx} onClick={() => setCurrentBannerIndex(idx)} className={`transition-all duration-300 rounded-full ${currentBannerIndex === idx ? 'w-8 h-2 bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.8)]' : 'w-2 h-2 bg-white/30 hover:bg-white/50'}`}></button>
                        ))}
                      </div>
                    )}
                  </section>
                );
              })()}

              {/* PARTNER LOGO SLIDER (MARQUEE) DENGAN PLACEHOLDER ESTETIK */}
              {partnerLogos.length > 0 && (
                <section className="relative w-full overflow-hidden bg-white/5 py-8 border-y border-white/5 backdrop-blur-sm -mt-6 rounded-3xl z-10 shadow-inner">
                   <div className="animate-marquee flex items-center">
                      {[...partnerLogos, ...partnerLogos, ...partnerLogos].map((l, i) => (
                        <div key={`${l.id}-${i}`} className="mx-6 sm:mx-10 h-10 sm:h-12 flex items-center opacity-50 hover:opacity-100 transition-opacity grayscale hover:grayscale-0 flex-shrink-0 cursor-default">
                          {l.logo ? (
                            <img src={l.logo} alt={l.name} className="h-full object-contain drop-shadow-md" />
                          ) : (
                            <div className="h-full px-6 flex items-center justify-center border-2 border-dashed border-white/30 rounded-lg text-white/50 font-bold uppercase tracking-widest text-[10px] whitespace-nowrap bg-black/20 hover:bg-white/5 transition-colors">
                              {l.name}
                            </div>
                          )}
                        </div>
                      ))}
                   </div>
                </section>
              )}

              <section className="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6">
                {[ { icon: 'fa-shield-alt', title: 'Garansi Resmi', desc: '100% Original' }, { icon: 'fa-truck', title: 'Gratis Ongkir', desc: 'Aman & Cepat' }, { icon: 'fa-headphones', title: 'Layanan 24/7', desc: 'Teknisi Handal' } ].map((feat, i) => (
                  <div key={i} className="bg-white p-6 rounded-2xl shadow-sm hover:shadow-xl hover:-translate-y-1 hover:border-purple-300 transition-all duration-300 flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-left gap-4 border border-slate-100 group cursor-default">
                    <div className="bg-purple-50 text-[#1A0B2E] w-12 h-12 flex items-center justify-center rounded-full group-hover:bg-gradient-to-br group-hover:from-cyan-400 group-hover:to-purple-500 group-hover:text-white group-hover:shadow-[0_0_15px_rgba(168,85,247,0.4)] transition-all duration-300"><i className={`fas ${feat.icon} text-xl`}></i></div>
                    <div><h3 className="font-bold text-sm text-[#1A0B2E] tracking-wide uppercase mb-1">{feat.title}</h3><p className="text-xs text-slate-500">{feat.desc}</p></div>
                  </div>
                ))}
              </section>

              <section id="katalog-produk">
                <div className="flex mb-6">
                  <div className="flex gap-4 overflow-x-auto py-4 px-2 -mx-2 scrollbar-hide w-full items-center">
                    {categories.map(cat => <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-6 py-2.5 rounded-full text-xs font-bold tracking-wider uppercase whitespace-nowrap transition-all duration-300 flex-shrink-0 ${activeCategory === cat ? 'bg-gradient-to-r from-cyan-500 to-purple-600 text-white shadow-[0_4px_15px_rgba(168,85,247,0.3)] scale-105' : 'bg-white text-slate-500 border border-slate-200 hover:border-purple-400 hover:text-[#1A0B2E]'}`}>{cat}</button>)}
                  </div>
                </div>

                {filteredProducts.length > 0 ? (
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-8">
                    {filteredProducts.map((product) => (
                      <div key={product.id} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-[0_15px_40px_-10px_rgba(168,85,247,0.2)] hover:-translate-y-2 hover:border-purple-300 transition-all duration-500 group flex flex-col h-full relative cursor-pointer">
                        <div className="relative aspect-[4/3] overflow-hidden bg-slate-50 p-6 flex items-center justify-center">
                          {product.badge && <span className="absolute top-4 left-4 bg-gradient-to-r from-cyan-400 to-purple-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-full z-10 uppercase tracking-widest shadow-md">{product.badge}</span>}
                          <img src={product.image} className="w-full h-full object-contain group-hover:scale-110 transition-transform duration-700 ease-out" />
                        </div>
                        <div className="p-6 flex flex-col flex-grow bg-white z-20">
                          <div className="text-[10px] text-purple-600 tracking-widest uppercase mb-2 font-bold bg-purple-50 inline-block px-2 py-1 rounded w-fit">{product.brand}</div>
                          <h3 className="font-semibold text-[15px] text-[#1A0B2E] line-clamp-2 mb-4 group-hover:text-purple-600 transition-colors leading-relaxed">{product.name}</h3>
                          <div className="mt-auto pt-4 border-t border-slate-50">
                            <div className="flex items-center gap-2 mb-1"><span className="text-xs text-slate-400 line-through">{formatRupiah(product.originalPrice)}</span></div>
                            <div className="text-xl font-black text-[#1A0B2E] mb-4 tracking-tight group-hover:scale-105 origin-left transition-transform duration-300">{formatRupiah(product.price)}</div>
                            {product.stock > 0 ? (
                              <button onClick={() => handleWhatsAppClick(product)} className="w-full py-3 px-4 bg-[#F7F5FA] text-[#1A0B2E] border border-purple-200/50 text-xs font-bold uppercase tracking-widest rounded-xl group-hover:bg-[#1A0B2E] group-hover:text-white transition-all flex items-center justify-center gap-2"><i className="fas fa-comment-dots"></i> Tanya Stok</button>
                            ) : (
                              <button disabled className="w-full py-3 px-4 bg-slate-100 text-slate-400 border border-slate-200/50 text-xs font-bold uppercase tracking-widest rounded-xl flex items-center justify-center gap-2 cursor-not-allowed"><i className="fas fa-times-circle"></i> Stok Kosong</button>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : <div className="text-center py-24 bg-white rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center"><div className="w-24 h-24 bg-purple-50 rounded-full flex items-center justify-center mb-6"><i className="fas fa-desktop text-4xl text-purple-300"></i></div><h3 className="text-xl font-bold text-[#1A0B2E] tracking-wide uppercase">Produk tidak ditemukan</h3></div>}
              </section>
            </main>

            {/* FOOTER MINIMALIS BARU */}
            <footer className="bg-[#0D0518] text-slate-400 border-t border-purple-500/20 py-8 mt-20 relative overflow-hidden">
              <div className="absolute top-0 right-0 w-96 h-96 bg-purple-900/10 rounded-full blur-[100px] pointer-events-none"></div>
              <div className="absolute bottom-0 left-0 w-96 h-96 bg-cyan-900/10 rounded-full blur-[100px] pointer-events-none"></div>
              
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 flex flex-col md:flex-row items-center justify-between gap-6">
                
                {/* Bagian Kiri: Logo & Slogan */}
                <div className="flex flex-col items-center md:items-start gap-2">
                  <img src="https://drive.google.com/thumbnail?id=1WLxFwy421QxxzZ4vfwfozlWSUT1qMZgr&sz=w800" alt="SMART TECHNOLOGY MANDIRI" className="h-8 sm:h-10 object-contain drop-shadow-md brightness-0 invert opacity-90" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/400x100/0D0518/ffffff?text=SMART+TECH'; }} />
                  <p className="text-[10px] sm:text-xs text-slate-500 font-light tracking-wide text-center md:text-left">
                    Mitra Teknologi Pintar & Terpercaya Anda.
                  </p>
                </div>

                {/* Bagian Tengah: Copyright */}
                <p className="text-[10px] tracking-widest text-slate-600 font-bold uppercase order-3 md:order-2">
                  © 2026 Smart Technology Mandiri.
                </p>

                {/* Bagian Kanan: Social Media */}
                <div className="flex gap-3 order-2 md:order-3">
                  {['FB', 'IG', 'TW', 'YT'].map(social => (
                    <div key={social} className="w-8 h-8 rounded-full bg-white/5 hover:bg-gradient-to-r hover:from-cyan-400 hover:to-purple-500 flex items-center justify-center text-slate-400 hover:text-white font-bold text-[10px] cursor-pointer transition-all duration-300 hover:-translate-y-1 shadow-sm">
                      {social}
                    </div>
                  ))}
                </div>

              </div>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    };

    initApp();
  </script>
</body>
</html>
