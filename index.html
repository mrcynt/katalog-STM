<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Smart Technology Mandiri</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & Babel (Penerjemah Otomatis) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#F4F7FB]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- DATA PRODUK ---
    const BRANDS = ['ASUS', 'ACER', 'LENOVO', 'HP', 'APPLE', 'MSI', 'LOGITECH', 'RAZER'];
    const PRODUCTS = [
      { id: 1, name: 'ASUS ROG Zephyrus G14 (2024)', price: 25999000, originalPrice: 28999000, category: 'Laptop', brand: 'ASUS', image: 'https://placehold.co/400x300/ffffff/002345?text=ASUS+ROG', rating: 4.9, badge: 'Save 10%' },
      { id: 2, name: 'Lenovo Legion Pro 5i - RTX 4070', price: 28500000, originalPrice: 30000000, category: 'Laptop', brand: 'LENOVO', image: 'https://placehold.co/400x300/ffffff/002345?text=Lenovo+Legion', rating: 4.8, badge: 'Best Seller' },
      { id: 3, name: 'MacBook Air M2 13-inch', price: 17499000, originalPrice: 18999000, category: 'Laptop', brand: 'APPLE', image: 'https://placehold.co/400x300/ffffff/002345?text=MacBook+Air', rating: 5.0, badge: 'Promo' },
      { id: 4, name: 'Logitech G Pro X Superlight', price: 1850000, originalPrice: 2100000, category: 'Aksesoris', brand: 'LOGITECH', image: 'https://placehold.co/400x300/ffffff/002345?text=Logitech+G+Pro', rating: 4.9, badge: '' }
    ];

    const formatRupiah = (number) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    };

    function App() {
      const [searchQuery, setSearchQuery] = useState('');
      const [activeCategory, setActiveCategory] = useState('Semua');
      const [scrolled, setScrolled] = useState(false);

      const categories = ['Semua', 'Laptop', 'Monitor', 'Aksesoris', 'Komponen PC'];

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const filteredProducts = PRODUCTS.filter(product => {
        const matchesCategory = activeCategory === 'Semua' || product.category === activeCategory;
        const matchesSearch = product.name.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesSearch;
      });

      return (
        <div className="min-h-screen font-sans text-gray-800">
          
          {/* HEADER */}
          <header className={`sticky top-0 z-40 transition-all duration-300 ${scrolled ? 'bg-[#002345]/90 backdrop-blur-lg shadow-lg py-2' : 'bg-[#002345] py-4'} border-b border-white/5`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between gap-6">
              
              <div className="flex items-center gap-3 cursor-pointer group">
                <img src="https://drive.google.com/thumbnail?id=1WLxFwy421QxxzZ4vfwfozlWSUT1qMZgr&sz=w800" alt="Logo" className="h-10 sm:h-12 object-contain group-hover:scale-105 transition-transform duration-300" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/400x100/002345/00f3ff?text=SMART+TECH'; }} />
              </div>

              <div className="flex-1 max-w-2xl hidden sm:flex relative">
                <input type="text" placeholder="Cari Laptop Gaming..." className="w-full bg-[#001830]/80 text-white border border-[#003366] rounded-full py-3 pl-6 pr-14 focus:outline-none focus:border-cyan-400" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
              </div>

              <div className="flex items-center gap-6 text-white text-[10px] tracking-wider uppercase font-bold">
                <span className="hover:text-cyan-400 cursor-pointer">Admin</span>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-12">
            
            {/* HERO BANNER */}
            <section className="relative rounded-3xl overflow-hidden shadow-2xl h-[300px] w-full flex items-center justify-center bg-gradient-to-br from-[#001122] via-[#002345] to-[#001830] text-white">
              <div className="relative z-10 text-center px-6 flex flex-col items-center">
                <h1 className="text-4xl sm:text-6xl font-black mb-4 tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400">KATALOG RESMI</h1>
                <p className="text-cyan-200/80 mb-8 tracking-wide">Pusat informasi dan katalog pintar produk IT.</p>
                <button className="bg-cyan-500 text-[#002345] font-bold py-3 px-8 rounded-full shadow-lg uppercase text-sm">Lihat Koleksi</button>
              </div>
            </section>

            {/* PRODUCT SECTION */}
            <section>
              <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide mb-6">
                {categories.map(cat => (
                  <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-6 py-2.5 rounded-full text-xs font-bold uppercase whitespace-nowrap transition-all ${activeCategory === cat ? 'bg-[#002345] text-cyan-400 scale-105' : 'bg-white text-slate-500 border border-slate-200'}`}>
                    {cat}
                  </button>
                ))}
              </div>

              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-8">
                {filteredProducts.map((product) => (
                  <div key={product.id} className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col hover:-translate-y-2 transition-transform duration-300">
                    <div className="relative aspect-[4/3] bg-slate-50 p-6">
                      {product.badge && <span className="absolute top-4 left-4 bg-[#002345] text-cyan-400 text-[10px] font-bold px-3 py-1.5 rounded-full z-10 uppercase">{product.badge}</span>}
                      <img src={product.image} className="w-full h-full object-contain" />
                    </div>
                    <div className="p-6 flex flex-col flex-grow">
                      <div className="text-[10px] text-cyan-600 font-bold uppercase mb-2 bg-cyan-50 inline-block px-2 py-1 rounded w-fit">{product.brand}</div>
                      <h3 className="font-semibold text-[15px] text-[#002345] mb-4">{product.name}</h3>
                      <div className="mt-auto">
                        <span className="text-xs text-slate-400 line-through">{formatRupiah(product.originalPrice)}</span>
                        <div className="text-xl font-black text-[#002345] mb-4">{formatRupiah(product.price)}</div>
                        <button className="w-full py-3 px-4 bg-slate-50 text-[#002345] border border-slate-200 text-xs font-bold uppercase rounded-xl hover:bg-[#002345] hover:text-cyan-400 transition-colors">Tanya Stok</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
